name: 'Build (android armv7)'

on:
  workflow_call:
    inputs:
      extra-conf-options:
        required: false
        type: string
      make-target:
        required: false
        type: string
        default: 'product-bundles test-bundles'
      debug-levels:
        required: false
        type: string
        default: '[ "debug", "release" ]'
      gcc-major-version:
        required: true
        type: string
      gcc-package-suffix:
        required: false
        type: string
        default: ''
      apt-extra-packages:
        required: false
        type: string
      configure-arguments:
        required: false
        type: string
      make-arguments:
        required: false
        type: string

jobs:
  build-android-armv7:
    name: build
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        debug-level: ${{ fromJSON(inputs.debug-levels) }}
        include:
          - debug-level: debug
            flags: --enable-debug
            suffix: -debug
          - debug-level: release
            flags: --with-debug-level=release --with-native-debug-symbols=none
            suffix: ''

    steps:
      - name: 'Checkout the JDK source'
        uses: actions/checkout@v4

      - name: 'Get the BootJDK'
        id: bootjdk
        uses: ./.github/actions/get-bootjdk
        with:
          platform: linux-x64

      - name: 'Install toolchain and dependencies'
        run: |
          chmod +x scripts/**
          sh scripts/android/create_sysroot.sh armhf

      - name: 'Configure'
        run: | 
          bash scripts/android/armv7.sh ${{ matrix.debug-level }}

      - name: 'Build'
        id: build
        uses: ./.github/actions/do-build
        env:
          STATIC_LIBS: ${{ matrix.debug-level == 'release' && 'static-libs-bundles' || '' }}
        with:
          make-target: '${{ inputs.make-target }} ${STATIC_LIBS} ${{ inputs.make-arguments }}'
          platform: armhf
          debug-suffix: '${{ matrix.suffix }}'

      - name: 'Upload bundles'
        uses: ./.github/actions/upload-bundles
        with:
          platform: armhf
          debug-suffix: '${{ matrix.suffix }}'
